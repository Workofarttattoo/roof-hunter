apiVersion: apps/v1
kind: Deployment
metadata:
  name: aero-command-deployment
  labels:
    app: aero-command
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aero-command
  template:
    metadata:
      labels:
        app: aero-command
    spec:
      containers:
      - name: aero-command
        image: aerocommand.azurecr.io/roof-hunter:latest
        ports:
        - containerPort: 5001
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "1"
            memory: "2Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: aero-command-service
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 5001
  selector:
    app: aero-command
