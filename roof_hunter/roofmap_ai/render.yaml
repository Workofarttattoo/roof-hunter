services:
  - type: web
    name: roofmap-ai-api
    runtime: python
    rootDir: roofmap_ai/backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGINS
        value: "*"
