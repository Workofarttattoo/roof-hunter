<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Roof Hunter Pro - Map Explorer</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Space+Grotesk:wght@600;700&amp;display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#00f0ff",
                        "surface": "#101415",
                        "background": "#101415",
                        "error": "#ffb4ab"
                    }
                }
            }
        }
    </script>
<style>
    #map { height: 100%; width: 100%; z-index: 0; }
    .custom-scrollbar::-webkit-scrollbar { width: 4px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(0, 240, 255, 0.2); border-radius: 4px; }
    .glass-panel { background: rgba(16, 20, 21, 0.8); backdrop-filter: blur(16px); }
</style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-['Inter'] overflow-hidden">

<!-- TopAppBar -->
<header class="bg-slate-950/80 backdrop-blur-lg font-['Space_Grotesk'] tracking-tight text-sm uppercase font-bold flex justify-between items-center w-full px-6 py-3 sticky top-0 z-50 border-b border-cyan-500/20 shadow-[0_4_20px_rgba(0,0,0,0.5)]">
<div class="flex items-center gap-6">
<span class="text-xl font-black tracking-tighter text-cyan-400 drop-shadow-[0_0_8px_rgba(0,240,255,0.5)]">Roof Hunter Pro</span>
<nav class="hidden md:flex gap-6 ml-8">
<a class="text-slate-400 hover:text-cyan-300 transition-colors duration-200" href="/landing">Dashboard</a>
<a class="text-cyan-400 border-b-2 border-cyan-400 pb-1" href="/map-intelligence">Map Explorer</a>
<a class="text-slate-400 hover:text-cyan-300 transition-colors duration-200" href="/">Lead Center</a>
</nav>
</div>
<div class="flex items-center gap-4">
<div class="relative hidden md:block">
<span class="material-symbols-outlined absolute left-2 top-1/2 -translate-y-1/2 text-slate-500 text-sm">search</span>
<input class="bg-slate-900 text-white border border-cyan-500/20 rounded pl-8 pr-2 py-1 text-xs w-48 focus:ring-1 focus:ring-cyan-500 outline-none" placeholder="Search Address..." type="text"/>
</div>
<button class="text-cyan-400 hover:text-cyan-300"><span class="material-symbols-outlined">notifications</span></button>
<button class="text-cyan-400 hover:text-cyan-300"><span class="material-symbols-outlined">settings</span></button>
<img alt="Profile" class="w-8 h-8 rounded-full border border-cyan-500/50" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDmeOYVl_fBiBinvAaFKMiXQV3Ia6J4izBmLvXQhagjCYX0K07GN-9KFf_gVwYsB2zgjfnz8BUfU5azIjaEFxIQBqvI3dvPzJxuBxkZsvSjx5mzYR3I4E8z5Lme8kIx5Kfmbs-Rs_e3i1YFP4MvTtOxYSnAhL5FpDK3D6Z5XcWHowY_v_fjsmNcUao_YoiVx0YlIrlAn7UJjpsBqck0jZfmno69oTaH1mEr6FB5pDMkKGlkuC8JSmNNO8oMZFHbybDCZs0rXmInLtEh"/>
</div>
</header>

<div class="flex flex-1 relative w-full h-[calc(100vh-60px)]">
<!-- Main Map Area -->
<main class="flex-1 relative bg-surface z-0 h-full">
    <div id="map"></div>
    
    <!-- Floating Layer Controls -->
    <div class="absolute top-6 left-6 z-[1000] flex flex-col gap-4">
        <div class="glass-panel border border-cyan-500/20 rounded-lg p-4 shadow-2xl w-64">
            <h3 class="font-['Space_Grotesk'] text-sm font-bold text-white mb-4 uppercase tracking-widest border-b border-cyan-500/20 pb-2">Layer Intelligence</h3>
            <div class="flex flex-col gap-3">
                <label class="flex items-center gap-3 cursor-pointer group">
                    <input checked class="form-checkbox text-cyan-400 bg-slate-900 border-cyan-500/30 rounded" type="checkbox"/>
                    <span class="text-[10px] uppercase font-bold text-slate-400 group-hover:text-cyan-400 transition-colors">Hail Severity (S2S)</span>
                </label>
                <label class="flex items-center gap-3 cursor-pointer group" onclick="toggleSatellite()">
                    <input class="form-checkbox text-cyan-400 bg-slate-900 border-cyan-500/30 rounded" type="checkbox" id="sat-toggle"/>
                    <span class="text-[10px] uppercase font-bold text-slate-400 group-hover:text-cyan-400 transition-colors">Forensic Satellite Recon</span>
                </label>
            </div>
        </div>
    </div>
</main>

<!-- Right Side Data Panel -->
<aside class="w-96 h-full bg-slate-950/90 backdrop-blur-xl border-l border-cyan-500/15 shadow-2xl flex flex-col z-40">
    <div class="p-6 border-b border-cyan-500/15">
        <h2 class="font-['Space_Grotesk'] text-xl font-black text-cyan-400 uppercase tracking-tighter">Live Strike Feed</h2>
        <div class="flex gap-4 mt-4">
            <div class="flex-1 bg-slate-900/50 border border-cyan-500/10 p-3 rounded-lg text-center">
                <p class="text-[8px] text-slate-500 uppercase font-bold">Active Targets</p>
                <p class="text-2xl font-black text-white" id="stat-targets">37</p>
            </div>
            <div class="flex-1 bg-slate-900/50 border border-cyan-500/10 p-3 rounded-lg text-center">
                <p class="text-[8px] text-slate-500 uppercase font-bold">Statewide ROI</p>
                <p class="text-2xl font-black text-cyan-400">$48.2M</p>
            </div>
        </div>
    </div>
    
    <div class="flex-1 overflow-y-auto p-4 flex flex-col gap-4 custom-scrollbar" id="leads-list">
        <!-- Injected by fetchLeads -->
    </div>
    
    <div class="p-6 border-t border-cyan-500/15 bg-slate-950">
        <button class="w-full py-3 bg-cyan-500 text-slate-950 font-['Space_Grotesk'] font-black uppercase tracking-widest rounded hover:shadow-[0_0_20px_rgba(0,240,255,0.5)] transition-all flex items-center justify-center gap-2">
            <span class="material-symbols-outlined text-sm">download</span>
            Export ROI Report (37)
        </button>
    </div>
</aside>
</div>

<script>
    const map = L.map('map', {
        center: [35.3394, -97.4867], 
        zoom: 12,
        zoomControl: false,
        attributionControl: false
    });

    const darkTiles = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 20 });
    const satelliteTiles = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom: 19 });

    darkTiles.addTo(map);
    let isSatellite = false;

    function toggleSatellite() {
        if (isSatellite) {
            map.removeLayer(satelliteTiles);
            darkTiles.addTo(map);
        } else {
            map.removeLayer(darkTiles);
            satelliteTiles.addTo(map);
        }
        isSatellite = !isSatellite;
    }

    // Marker Clustering
    const markers = L.markerClusterGroup({
        showCoverageOnHover: false,
        zoomToBoundsOnClick: true,
        spiderfyOnMaxZoom: true,
        maxClusterRadius: 50
    });

    async function fetchLeads() {
        const response = await fetch('/api/alerts');
        const data = await response.json();
        const list = document.getElementById('leads-list');
        list.innerHTML = '';
        markers.clearLayers();

        data.forEach((lead, index) => {
            const lat = 35.3394 + (Math.random() - 0.5) * 0.15;
            const lon = -97.4867 + (Math.random() - 0.5) * 0.15;

            const marker = L.circleMarker([lat, lon], {
                radius: 8,
                fillColor: "#00f0ff",
                color: "#fff",
                weight: 1,
                opacity: 1,
                fillOpacity: 0.8
            });

            const popupHtml = `
                <div class="flex flex-col w-64 bg-slate-900 text-white rounded overflow-hidden">
                    <img src="/forensics/${lead.image}" class="w-full h-32 object-cover">
                    <div class="p-4 space-y-2">
                        <p class="text-[10px] font-black uppercase text-cyan-400">${lead.address}</p>
                        <p class="text-lg font-black">${lead.revenue}</p>
                        <button class="w-full py-2 bg-cyan-500 text-slate-950 text-[10px] font-bold rounded">BUY LEAD</button>
                    </div>
                </div>
            `;
            marker.bindPopup(popupHtml);
            markers.addLayer(marker);

            // Add to sidebar feed
            const leadEl = document.createElement('div');
            leadEl.className = 'bg-slate-900/60 border border-cyan-500/10 rounded-lg p-4 relative overflow-hidden group hover:bg-slate-900 transition-all cursor-pointer';
            leadEl.onclick = () => { map.flyTo([lat, lon], 15); marker.openPopup(); };
            leadEl.innerHTML = `
                <div class="absolute left-0 top-0 bottom-0 w-1 bg-cyan-400"></div>
                <div class="flex justify-between items-start mb-2">
                    <span class="bg-cyan-500/20 text-cyan-400 text-[8px] px-2 py-1 rounded-full font-bold uppercase tracking-widest">${lead.tag}</span>
                    <span class="text-[8px] text-slate-500 font-bold">JUST NOW</span>
                </div>
                <h4 class="text-xs font-bold text-white mb-1">${lead.address}</h4>
                <p class="text-[10px] text-slate-400 mb-2">${lead.contact}</p>
                <div class="flex justify-between items-center border-t border-cyan-500/10 pt-2">
                    <span class="text-[8px] text-slate-500 uppercase font-bold">ROI EST</span>
                    <span class="text-xs font-black text-cyan-400">${lead.revenue}</span>
                </div>
            `;
            list.appendChild(leadEl);
        });
        map.addLayer(markers);
    }

    fetchLeads();
</script>

</body></html>
