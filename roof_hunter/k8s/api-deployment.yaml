# FastAPI dashboard API. Data comes from the image (/app/data) unless you add a PVC
# (mount empty PVC over /app/data only after you seed authoritative_storms.db).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: roof-hunter-dashboard-api
  namespace: roof-hunter
  labels:
    app.kubernetes.io/component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: roof-hunter-dashboard-api
  template:
    metadata:
      labels:
        app: roof-hunter-dashboard-api
    spec:
      containers:
        - name: api
          image: roofhunter.azurecr.io/roof-hunter-dashboard-api:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: ROOF_HUNTER_ROOT
              value: /app/data
            - name: ROOF_HUNTER_DB_PATH
              value: /app/data/leads_manifests/authoritative_storms.db
            - name: ROOF_HUNTER_TRAINING_DIR
              value: /app/data/training_data
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: roof-hunter-dashboard-api
  namespace: roof-hunter
spec:
  type: ClusterIP
  selector:
    app: roof-hunter-dashboard-api
  ports:
    - name: http
      port: 8000
      targetPort: http
