# RoofHunter Pro SPA (nginx). Replace image with your ACR image after build.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: roof-hunter-web
  namespace: roof-hunter
  labels:
    app.kubernetes.io/component: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: roof-hunter-web
  template:
    metadata:
      labels:
        app: roof-hunter-web
    spec:
      containers:
        - name: nginx
          image: roofhunter.azurecr.io/roof-hunter-web:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: roof-hunter-web
  namespace: roof-hunter
  labels:
    app.kubernetes.io/component: web
spec:
  type: ClusterIP
  selector:
    app: roof-hunter-web
  ports:
    - name: http
      port: 80
      targetPort: http
